<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="plate" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#E8DCC8"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#3D1F08"/>
      <stop offset="100%" stop-color="#1A0A02"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Table surface -->
  <ellipse cx="400" cy="550" rx="380" ry="80" fill="#2C1505" opacity="0.8"/>
  <!-- Plate -->
  <ellipse cx="400" cy="320" rx="200" ry="200" fill="#2A1A08" opacity="0.3"/>
  <ellipse cx="400" cy="320" rx="180" ry="180" fill="url(#plate)"/>
  <ellipse cx="400" cy="320" rx="170" ry="170" fill="none" stroke="#D4B896" stroke-width="2" opacity="0.5"/>
  <!-- Lamb/Meat (main dish) -->
  <ellipse cx="400" cy="330" rx="100" ry="70" fill="#8B3A0F"/>
  <ellipse cx="400" cy="325" rx="95" ry="65" fill="#A0430F"/>
  <ellipse cx="400" cy="320" rx="85" ry="55" fill="#B85015"/>
  <!-- Herb garnish -->
  <ellipse cx="350" cy="280" rx="25" ry="12" fill="#2D6A2D" opacity="0.9"/>
  <ellipse cx="370" cy="275" rx="20" ry="10" fill="#3A8A3A" opacity="0.9"/>
  <ellipse cx="440" cy="278" rx="22" ry="11" fill="#2D6A2D" opacity="0.9"/>
  <!-- Side vegetables -->
  <ellipse cx="310" cy="340" rx="30" ry="20" fill="#D4691E" opacity="0.9"/>
  <ellipse cx="490" cy="340" rx="28" ry="18" fill="#8B6914" opacity="0.9"/>
  <!-- Sauce drizzle -->
  <path d="M340 310 Q380 290 420 310 Q450 325 430 340" stroke="#C8860A" stroke-width="3" fill="none" opacity="0.8"/>
  <!-- Steam effect -->
  <path d="M370 240 Q365 220 372 200 Q378 180 373 160" stroke="white" stroke-width="2" fill="none" opacity="0.15" stroke-linecap="round"/>
  <path d="M400 235 Q395 215 402 195 Q408 175 403 155" stroke="white" stroke-width="2" fill="none" opacity="0.12" stroke-linecap="round"/>
  <path d="M430 240 Q425 220 432 200 Q438 180 433 160" stroke="white" stroke-width="2" fill="none" opacity="0.15" stroke-linecap="round"/>
  <!-- Fork -->
  <rect x="220" y="250" width="4" height="120" rx="2" fill="#C0C0C0" opacity="0.7"/>
  <rect x="218" y="245" width="2" height="30" rx="1" fill="#C0C0C0" opacity="0.7"/>
  <rect x="224" y="245" width="2" height="30" rx="1" fill="#C0C0C0" opacity="0.7"/>
  <rect x="230" y="245" width="2" height="30" rx="1" fill="#C0C0C0" opacity="0.7"/>
  <!-- Knife -->
  <rect x="560" y="250" width="4" height="120" rx="2" fill="#C0C0C0" opacity="0.7"/>
  <path d="M564 250 L575 270 L564 290 Z" fill="#E0E0E0" opacity="0.7"/>
  <!-- Candle light -->
  <ellipse cx="630" cy="180" rx="15" ry="40" fill="#FFF8E0" opacity="0.1"/>
  <rect x="627" y="185" width="6" height="50" rx="3" fill="#F5E6C8" opacity="0.6"/>
  <ellipse cx="630" cy="182" rx="5" ry="8" fill="#FFD700" opacity="0.8"/>
  <ellipse cx="630" cy="178" rx="3" ry="5" fill="#FF8C00" opacity="0.9"/>
  <!-- Gold text -->
  <text x="400" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#C8860A" opacity="0.8">Burak Restaurant</text>
  <text x="400" y="548" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#8B6914" opacity="0.7">Authentic Flavors</text>
</svg>
